name: Release GUI

on:
  push:
    tags:
      - "gui-v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., gui-v1.0.0)'
        required: true
        default: 'gui-v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: tls-client-gui
      
      - uses: actions/checkout@v4
        with:
          repository: user/tls-client
          path: tls-client
      
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd tls-client-gui
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          
          BINARY="tls-client-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath -ldflags="${LDFLAGS}" -o "../dist/${BINARY}" ./cmd/tls-client-gui/
          
          echo "Built: ${BINARY}"
          ls -la ../dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls-client-gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -name 'tls-client-gui-*' -exec cp {} release/ \;
          ls -la release/
          
          # Create checksums
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
